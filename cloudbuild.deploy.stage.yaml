# Keyless CI deploy pipeline — STAGE (chunk 0095).
#
# Sibling of cloudbuild.deploy.yaml (prod). Triggered on push to `dev` (in project
# eventpro-stage) → gate → build → push → deploy the `event-manager-pro-sandbox`
# service. Same keyless model (runs as eventpro-stage's Compute SA).
#
# Why a separate file (not one parametrized config): stage and prod diverge a lot
# — different project, service, DB secret, Supabase creds (baked into the client
# bundle at build time, so stage builds its OWN image), mail redirect
# (EMAIL_DEV_TO), sandbox BoldSign, and stage has NO QuickBooks / Google Calendar.
# Two explicit files are clearer than hiding those differences in conditionals.
#
# $PROJECT_ID resolves to eventpro-stage (the build runs there), so image refs,
# --project, and the secret mounts all target stage automatically.

substitutions:
  # The environment is "stage". The service is (historically) named
  # event-manager-pro-sandbox — a legacy pin, not worth a live-service migration.
  _SERVICE_NAME: event-manager-pro-sandbox
  _REGION: us-east4
  # Runtime APP_ENV. 'stage' is safe: the app only gates on APP_ENV==='production'
  # (isProductionEnv), so any non-prod value behaves identically (BoldSign
  # isSandbox=true, mail via EMAIL_DEV_TO). Was 'sandbox' pre-2026-07-03.
  _APP_ENV: stage
  _IMAGE_TAG: latest
  _SITE_URL: https://event-manager-pro-sandbox-p5mcu2hrga-uk.a.run.app
  # Set on the trigger / local wrapper from .env.local (stage Supabase project).
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _MSA_TEMPLATE_VERSION: ''
  _GCS_BUCKET: ''
  _GCS_PROJECT_ID: ''
  _RESEND_FROM_EMAIL: ''
  # Stage-only: redirect ALL outbound mail here (else sendEmail + BoldSign refuse
  # to send on a non-production deploy).
  _EMAIL_DEV_TO: 'david.hogan@networknode.ca'
  _BOLDSIGN_API_BASE_URL: https://api-ca.boldsign.com
  # Twilio campaign SMS (0103). The account SID mounts from Secret Manager
  # alongside the auth token + identity-HMAC key — not because the SID is
  # truly secret (it's an identifier) but because GitHub Push Protection
  # pattern-matches `AC…` SIDs and blocks any push containing one.
  # _SMS_DEV_TO mirrors _EMAIL_DEV_TO: non-prod redirects every send to this
  # phone (else sendSms refuses). The 902-710-8640 number is the campaign
  # sender — NEVER pool +19027073043 here (it belongs to the live traffic app).
  _TWILIO_MESSAGING_SERVICE_SID: MG39b602366c521eb2d6aa90047a5e6cc8
  _SMS_DEV_TO: '+15149185000'

steps:
  # 1) Unit-test gate (same as prod: unit-only; integration flakes on the pooler).
  - id: test-gate
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache libc6-compat
        corepack enable
        pnpm install --frozen-lockfile
        pnpm exec vitest run --exclude 'tests/integration/**'

  # 2) Build the STAGE image (stage Supabase creds baked in via build args).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .

  # 3) Push before deploy (the images: block would push too late).
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}

  # 4) Deploy to Cloud Run. Stage: APP_ENV=stage (non-prod → BoldSign
  #    isSandbox=true, mail via EMAIL_DEV_TO), DB secret `database-url`, NO
  #    QBO / Calendar mounts.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=^@@^NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}@@NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}@@SITE_URL=${_SITE_URL}@@APP_ENV=${_APP_ENV}@@MSA_TEMPLATE_VERSION=${_MSA_TEMPLATE_VERSION}@@GCS_BUCKET=${_GCS_BUCKET}@@GCS_PROJECT_ID=${_GCS_PROJECT_ID}@@RESEND_FROM_EMAIL=${_RESEND_FROM_EMAIL}@@EMAIL_DEV_TO=${_EMAIL_DEV_TO}@@BOLDSIGN_API_BASE_URL=${_BOLDSIGN_API_BASE_URL}@@TWILIO_MESSAGING_SERVICE_SID=${_TWILIO_MESSAGING_SERVICE_SID}@@SMS_DEV_TO=${_SMS_DEV_TO}
      - --set-secrets=DATABASE_URL=database-url:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,BOLDSIGN_API_KEY=boldsign-api-key:latest,BOLDSIGN_WEBHOOK_SECRET=boldsign-webhook-secret:latest,RESEND_API_KEY=resend-api-key:latest,TWILIO_ACCOUNT_SID=twilio-account-sid:latest,TWILIO_AUTH_TOKEN=twilio-auth-token:latest,SMS_IDENTITY_HMAC_KEY=sms-identity-hmac-key:latest

# No `images:` block — the push step already uploads both tags before deploy.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
