# Keyless CI deploy pipeline — chunk 0095.
#
# Triggered on push to `main` (in project eventpro-498313) → gate → build →
# deploy PROD to Cloud Run, entirely server-side. No local `gcloud auth login`,
# no service-account key (the org blocks SA keys via
# iam.disableServiceAccountKeyCreation). This is the keyless replacement for
# running ./deploy.sh from a laptop.
#
# Safety: the owner chose "push to main = prod", which drops deploy.sh's typed
# `DEPLOY_CONFIRM=production` gate. In its place, the `test-gate` step below runs
# the unit suite BEFORE the deploy step, so a red commit fails the build and
# never reaches prod. The image build (`next build`, no ignoreBuildErrors /
# ignoreDuringBuilds) additionally gates TypeScript + ESLint for free.
#
# deploy.sh + the build-only cloudbuild.yaml stay as a manual fallback (e.g. a
# hotfix when GitHub/Cloud Build is down) — this file does not replace them.
#
# Env-specific NON-secret config arrives as trigger substitutions (the Supabase
# URL + anon key are public — they ship in the client bundle). The real secrets
# stay in Secret Manager and are mounted per-revision via --set-secrets:latest.

substitutions:
  _SERVICE_NAME: event-manager-pro
  _REGION: us-east4
  _APP_ENV: production
  # Image tag. Defaults to 'latest' so a manual `gcloud builds submit` (where the
  # built-in $SHORT_SHA is empty) still produces a valid tag; the local wrapper
  # (scripts/submit-deploy.sh) overrides it with a timestamp, and a future GitHub
  # trigger can set it to $SHORT_SHA for commit-level traceability.
  _IMAGE_TAG: latest
  # Set on the trigger from .env.production.local (see 0095 runbook).
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _MSA_TEMPLATE_VERSION: ''
  _GCS_BUCKET: ''
  _GCS_PROJECT_ID: ''
  _RESEND_FROM_EMAIL: ''
  # Stable prod values (safe to default here; overridable on the trigger).
  _BOLDSIGN_API_BASE_URL: https://api-ca.boldsign.com
  _SITE_URL: https://eventpro.salesability.ca
  # Prod-only Google Calendar projection (chunk 0077).
  _GOOGLE_CALENDAR_SA_EMAIL: eventpro-calendar@eventpro-498313.iam.gserviceaccount.com
  _GOOGLE_CALENDAR_ID: c_eb45f29a4477f0e879861e24e1cdfaeed04ad140a1f5172919e22b82a57943c5@group.calendar.google.com
  _GOOGLE_CALENDAR_SUBJECT: shannon@salesability.ca

steps:
  # 1) Unit-test gate — blocks the deploy on a red suite. Integration tests are
  #    excluded: they hit the sandbox pooler and trip the EMAXCONNSESSION flake.
  #    node:22-alpine + libc6-compat mirror the Dockerfile base.
  - id: test-gate
    name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        apk add --no-cache libc6-compat
        corepack enable
        pnpm install --frozen-lockfile
        pnpm exec vitest run --exclude 'tests/integration/**'

  # 2) Build the image. `next build` inside the Dockerfile also gates tsc + eslint.
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest
      - .

  # 3) Push to the registry BEFORE deploy. (The `images:` block pushes only after
  #    all steps finish — too late for an in-build deploy, which pulls from the
  #    registry, not the build daemon.) `--all-tags` covers both tags built above.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}

  # 4) Deploy to Cloud Run as the trigger's service account (keyless). Mirrors
  #    the `gcloud run deploy` in deploy.sh: same env vars + secret mounts.
  #    BOLDSIGN_SENDER_EMAIL is intentionally omitted (onBehalfOf is inert; the
  #    Shannon-owned key handles sender attribution — chunk 0092).
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${_IMAGE_TAG}
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --set-env-vars=^@@^NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}@@NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}@@SITE_URL=${_SITE_URL}@@APP_ENV=${_APP_ENV}@@MSA_TEMPLATE_VERSION=${_MSA_TEMPLATE_VERSION}@@GCS_BUCKET=${_GCS_BUCKET}@@GCS_PROJECT_ID=${_GCS_PROJECT_ID}@@RESEND_FROM_EMAIL=${_RESEND_FROM_EMAIL}@@BOLDSIGN_API_BASE_URL=${_BOLDSIGN_API_BASE_URL}@@QBO_ENV=production@@GOOGLE_CALENDAR_SA_EMAIL=${_GOOGLE_CALENDAR_SA_EMAIL}@@GOOGLE_CALENDAR_ID=${_GOOGLE_CALENDAR_ID}@@GOOGLE_CALENDAR_SUBJECT=${_GOOGLE_CALENDAR_SUBJECT}
      # 0097 production feed (Google Sheet IMPORTDATA): to activate the prod feed,
      # first create the secret —
      #   printf '%s' "$(openssl rand -hex 32)" | gcloud secrets create production-feed-token \
      #     --project=eventpro-498313 --replication-policy=automatic --data-file=-
      #   gcloud secrets add-iam-policy-binding production-feed-token --project=eventpro-498313 \
      #     --member=serviceAccount:1094204863648-compute@developer.gserviceaccount.com \
      #     --role=roles/secretmanager.secretAccessor
      # — then append to the --set-secrets line below:
      #   ,PRODUCTION_FEED_TOKEN=production-feed-token:latest
      # (Kept out of the live list so a deploy never fails on a not-yet-created secret;
      #  the route fails closed with 500 "not configured" until it's wired.)
      - --set-secrets=DATABASE_URL=database-url-production:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,BOLDSIGN_API_KEY=boldsign-api-key:latest,BOLDSIGN_WEBHOOK_SECRET=boldsign-webhook-secret:latest,RESEND_API_KEY=resend-api-key:latest,QBO_CLIENT_ID=quickbooks-client-id:latest,QBO_CLIENT_SECRET=quickbooks-client-secret:latest,QBO_TOKEN_ENC_KEY=quickbooks-token-enc-key:latest

# No `images:` block — the push step above already uploads both tags before the
# deploy. Listing them here would trigger a second, post-deploy push (wasteful).

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
